[env:esp32dev]
platform = espressif32
framework = arduino
board = esp32dev
board_build.partitions = huge_app.csv
monitor_speed = 115200
build_flags =
  -DARDUINO_ARCH_ESP32

lib_deps =
  bblanchon/ArduinoJson @ ^6.18.5

; If you need specific upload_port, set it in CLI or override here

[platformio]
description = CIM v6.0 ESP32 firmware (BLE + SPP + ESP-NOW)

